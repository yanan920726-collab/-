<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小说漫画下载台</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f4f7f6;
      --surface: #ffffff;
      --surface-soft: #f7faf9;
      --line: #dfe7e4;
      --line-strong: #b8c8c2;
      --text: #182521;
      --muted: #60706a;
      --soft: #edf3f1;
      --primary: #0f766e;
      --primary-dark: #0b5f59;
      --teal: #0f766e;
      --teal-soft: #d9f3ee;
      --amber: #a16207;
      --amber-soft: #fff7df;
      --rose: #be123c;
      --rose-soft: #ffe4e6;
      --success: #047857;
      --danger: #b42318;
      --shadow: 0 14px 38px rgba(22, 45, 38, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    * {
      min-width: 0;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.10), transparent 360px),
        linear-gradient(180deg, #fbfdfc 0%, var(--page) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", sans-serif;
      font-size: 14px;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .shell {
      width: min(1500px, calc(100vw - 24px));
      margin: 12px auto 28px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 64px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: var(--radius);
      background: #0f766e;
      color: #ffffff;
      flex: 0 0 auto;
    }

    .brand-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .brand-subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 13px;
    }

    .service-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: var(--surface-soft);
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--amber);
    }

    .status-dot.ok { background: var(--success); }
    .status-dot.bad { background: var(--danger); }

    .workspace {
      display: grid;
      grid-template-columns: minmax(360px, 420px) minmax(0, 1fr);
      gap: 12px;
      margin-top: 12px;
      align-items: start;
    }

    .workspace > aside.panel {
      position: sticky;
      top: 12px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 46px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfc;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 0;
      font-size: 15px;
    }

    .panel-body {
      padding: 14px;
    }

    .form-stack {
      display: grid;
      gap: 13px;
    }

    .quick-guide {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 0;
    }

    .guide-step {
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfc;
      min-width: 0;
    }

    .guide-step strong {
      display: block;
      margin-bottom: 2px;
      font-size: 12px;
      color: var(--primary-dark);
    }

    .guide-step span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .field label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      font-weight: 700;
      color: #24352f;
    }

    .field-hint {
      font-weight: 500;
      color: var(--muted);
      font-size: 12px;
    }

    textarea, input, select {
      width: 100%;
      max-width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--text);
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    textarea {
      min-height: 116px;
      resize: vertical;
      padding: 12px 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    input, select {
      min-height: 38px;
      padding: 8px 11px;
    }

    textarea:focus, input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .split {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .button-row.single {
      grid-template-columns: 1fr;
    }

    .primary-actions {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
      gap: 10px;
    }

    .secondary-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 38px;
      padding: 9px 12px;
      border-radius: var(--radius);
      font-weight: 800;
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn svg, .icon {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .btn-primary {
      background: var(--primary);
      color: #ffffff;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-dark {
      background: #1f2937;
      color: #ffffff;
    }

    .btn-dark:hover { background: #0f172a; }

    .btn-ghost {
      background: var(--teal-soft);
      color: var(--primary-dark);
      border: 1px solid #a9ded5;
    }

    .btn-ghost:hover {
      background: #c8eee7;
    }

    .btn-soft {
      background: var(--soft);
      color: #334155;
      border: 1px solid var(--line);
    }

    .btn-soft:hover {
      background: #e8edf5;
    }

    .task-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
      max-height: 150px;
      overflow: auto;
      padding-right: 2px;
    }

    .placeholder-card {
      display: grid;
      place-items: center;
      min-height: 210px;
      padding: 22px;
      text-align: center;
      color: var(--muted);
      line-height: 1.7;
    }

    .placeholder-card strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 15px;
    }

    .task-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfc;
      cursor: pointer;
      transition: border-color 180ms ease, background 180ms ease;
    }

    .task-item:hover, .task-item.active {
      border-color: var(--primary);
      background: #edf8f5;
    }

    .task-url {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
      font-weight: 650;
    }

    .task-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .mini-badge {
      align-self: start;
      padding: 4px 8px;
      border-radius: 999px;
      background: #e8f0ed;
      color: #344054;
      font-size: 12px;
      white-space: nowrap;
    }

    .info-box {
      display: grid;
      gap: 6px;
      padding: 10px;
      border: 1px solid #eddba9;
      border-radius: var(--radius);
      background: var(--amber-soft);
      color: #6f4a0b;
      line-height: 1.55;
      font-size: 12px;
    }

    .info-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(300px, 420px) minmax(0, 1fr);
      gap: 12px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(78px, 1fr));
      gap: 7px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .metric {
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfc;
      min-width: 0;
    }

    .metric.is-empty {
      background: #fbfcfc;
      color: var(--muted);
    }

    .metric-value {
      display: block;
      margin-bottom: 4px;
      font-size: 16px;
      font-weight: 850;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .metric.is-empty .metric-value {
      color: #7a8984;
      font-weight: 750;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
    }

    .tree-wrap {
      max-height: 560px;
      overflow: auto;
    }

    .node-row {
      display: grid;
      grid-template-columns: 20px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      min-height: 38px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      line-height: 1.45;
      transition: background 150ms ease;
    }

    .node-row:hover, .node-row.active {
      background: #edf8f5;
    }

    .caret {
      color: var(--muted);
      text-align: center;
      font-size: 12px;
    }

    .node-title {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .badge {
      border-radius: 999px;
      background: #e8f0ed;
      color: #374151;
      font-size: 12px;
      padding: 4px 8px;
      white-space: nowrap;
    }

    .children { display: none; }
    .node.expanded > .children { display: block; }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 190px;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
    }

    .empty-state strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
    }

    .preview-panel {
      min-height: 620px;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfc;
    }

    .preview-title {
      margin: 0;
      font-size: 16px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .preview-body {
      min-height: 380px;
      max-height: 520px;
      overflow: auto;
      padding: 16px;
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 15px;
      background: #ffffff;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .image-preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .image-preview-grid img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #eef2f7;
    }

    .log {
      min-height: 118px;
      max-height: 170px;
      overflow: auto;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: #16231f;
      color: #d6f5eb;
      white-space: pre-wrap;
      line-height: 1.65;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .danger-text { color: var(--danger); }
    .muted { color: var(--muted); }

    .progress {
      height: 8px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }

    .progress span {
      display: block;
      width: 0%;
      height: 100%;
      background: var(--teal);
      transition: width 220ms ease;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 1180px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
      .preview-panel { min-height: 0; }
      .secondary-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .secondary-actions .btn:last-child {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 860px) {
      .workspace {
        grid-template-columns: 1fr;
      }
      .workspace > aside.panel {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100vw - 18px, 1440px);
        margin-top: 9px;
      }
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
      .split, .button-row, .metrics {
        grid-template-columns: 1fr;
      }
      .quick-guide, .primary-actions, .secondary-actions {
        grid-template-columns: 1fr;
      }
      .secondary-actions .btn:last-child {
        grid-column: auto;
      }
      .panel-body {
        padding: 12px;
      }
      .brand-title {
        font-size: 18px;
      }
      .preview-body {
        max-height: 520px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" class="icon">
            <path d="M5 4.75A2.75 2.75 0 0 1 7.75 2h8.5A2.75 2.75 0 0 1 19 4.75v14.5A2.75 2.75 0 0 1 16.25 22h-8.5A2.75 2.75 0 0 1 5 19.25V4.75Z" stroke="currentColor" stroke-width="1.8"/>
            <path d="M8.25 6.5h7.5M8.25 10h7.5M8.25 13.5h4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1 class="brand-title">小说漫画下载台</h1>
          <p class="brand-subtitle">粘贴链接，先看结构和预览，再放心下载到本地。</p>
        </div>
      </div>
      <div class="service-pill" id="serviceStatus">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">正在连接本地服务</span>
      </div>
    </header>

    <main class="workspace">
      <aside class="panel">
        <div class="panel-header">
          <h2 class="panel-title">
            <svg viewBox="0 0 24 24" fill="none" class="icon" aria-hidden="true">
              <path d="M4 6.5h16M4 12h16M4 17.5h10" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
            </svg>
            新建下载
          </h2>
          <span class="mini-badge" id="taskCount">0 条</span>
        </div>
        <div class="panel-body">
          <div class="form-stack">
            <div class="quick-guide" aria-label="操作流程">
              <div class="guide-step">
                <strong>1. 粘贴</strong>
                <span>一行一个链接，重复会自动去掉。</span>
              </div>
              <div class="guide-step">
                <strong>2. 预览</strong>
                <span>先确认目录、章节和图片。</span>
              </div>
              <div class="guide-step">
                <strong>3. 下载</strong>
                <span>断点续下，已保存会跳过。</span>
              </div>
            </div>

            <div class="field">
              <label for="urls">
                下载链接
                <span class="field-hint">支持多条</span>
              </label>
              <textarea id="urls" placeholder="把小说目录、分类页、漫画页粘贴到这里&#10;每行一个链接，例如：&#10;https://book.xbookcn.net/search/label/xxx&#10;https://manwaka.cc/cate/manhwa"></textarea>
            </div>

            <div class="split">
              <div class="field">
                <label for="downloadType">内容类型</label>
                <select id="downloadType">
                  <option value="auto" selected>自动判断</option>
                  <option value="novel">小说正文</option>
                  <option value="comic">漫画图片</option>
                  <option value="media">音视频尝试</option>
                </select>
              </div>
              <div class="field">
                <label for="workers">下载速度</label>
                <select id="workers">
                  <option value="2" selected>稳妥：2 个同时跑</option>
                  <option value="1">最稳：1 个慢慢下</option>
                  <option value="3">偏快：3 个同时跑</option>
                  <option value="4">更快：4 个同时跑</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label for="output">保存目录</label>
              <input id="output" value="下载的小说" />
            </div>

            <div class="primary-actions">
              <button class="btn btn-primary" id="inspectBtn" type="button">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M11 19a8 8 0 1 1 5.3-2.02L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M8 11h6M11 8v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                先看预览
              </button>
              <button class="btn btn-dark" id="downloadBtn" type="button">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3v11m0 0 4-4m-4 4-4-4M5 20h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                下载当前
              </button>
            </div>

            <div class="secondary-actions">
              <button class="btn btn-ghost" id="inspectAllBtn" type="button">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 6h13M8 12h13M8 18h13M3.5 6h.01M3.5 12h.01M3.5 18h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                批量预览
              </button>
              <button class="btn btn-soft" id="downloadAllBtn" type="button">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 7h10M7 12h10M7 17h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M4 4.75C4 3.78 4.78 3 5.75 3h12.5C19.22 3 20 3.78 20 4.75v14.5c0 .97-.78 1.75-1.75 1.75H5.75C4.78 21 4 20.22 4 19.25V4.75Z" stroke="currentColor" stroke-width="1.8"/></svg>
                批量下载
              </button>
              <button class="btn btn-soft" id="openBtn" type="button">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3.75 6.75A1.75 1.75 0 0 1 5.5 5h4.1l2 2H18.5a1.75 1.75 0 0 1 1.75 1.75v8.75A1.75 1.75 0 0 1 18.5 19H5.5a1.75 1.75 0 0 1-1.75-1.75V6.75Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
                打开目录
              </button>
            </div>

            <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>

            <div class="info-box">
              <div class="info-line">
                <svg viewBox="0 0 24 24" fill="none" class="icon" aria-hidden="true"><path d="M12 3 4.5 6.2v5.7c0 4.6 3.1 7.8 7.5 9.1 4.4-1.3 7.5-4.5 7.5-9.1V6.2L12 3Z" stroke="currentColor" stroke-width="1.8"/><path d="m8.75 12.1 2.1 2.1 4.55-4.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
                只处理 http/https 链接；文件保存在本机，重复章节和图片会自动跳过。
              </div>
              <div class="info-line">
                <svg viewBox="0 0 24 24" fill="none" class="icon" aria-hidden="true"><path d="M12 6v6l4 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M21 12a9 9 0 1 1-3.3-6.96" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
                网站反应慢时，把速度调到 1 或 2，更稳也更不容易失败。
              </div>
            </div>

            <div>
              <div class="field">
                <label>链接队列 <span class="field-hint">点击切换</span></label>
              </div>
              <div class="task-list" id="taskList"></div>
            </div>
          </div>
        </div>
      </aside>

      <section class="main-grid">
        <div class="panel">
          <div class="panel-header">
            <h2 class="panel-title">
              <svg viewBox="0 0 24 24" fill="none" class="icon" aria-hidden="true"><path d="M4 5.5h16M4 12h16M4 18.5h16" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>
              目录结构
            </h2>
            <span class="mini-badge" id="currentTaskBadge">未选择</span>
          </div>
          <div class="metrics" id="metrics"></div>
          <div class="tree-wrap" id="chapters">
            <div class="empty-state"><div><strong>还没有目录</strong>预览后会在这里显示分类、书名、章节和正文层级。</div></div>
          </div>
        </div>

        <div class="panel preview-panel">
          <div class="preview-toolbar">
            <h2 class="preview-title" id="previewTitle">还没有预览</h2>
            <button class="btn btn-soft" id="copyPreviewBtn" type="button">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 8V5.75C8 4.78 8.78 4 9.75 4h8.5c.97 0 1.75.78 1.75 1.75v8.5c0 .97-.78 1.75-1.75 1.75H16" stroke="currentColor" stroke-width="1.8"/><path d="M4 9.75C4 8.78 4.78 8 5.75 8h8.5c.97 0 1.75.78 1.75 1.75v8.5c0 .97-.78 1.75-1.75 1.75h-8.5C4.78 20 4 19.22 4 18.25v-8.5Z" stroke="currentColor" stroke-width="1.8"/></svg>
              复制
            </button>
          </div>
          <div class="preview-body" id="previewBody">先粘贴链接，再点“先看预览”。这里会显示真实正文、漫画图片，或者识别到的目录说明。</div>
          <div class="log" id="log">就绪。先粘贴一个链接试试。</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    let API_BASE = `${location.protocol}//${location.host}`;
    const urlsInput = document.getElementById("urls");
    const outputInput = document.getElementById("output");
    const workersInput = document.getElementById("workers");
    const downloadTypeInput = document.getElementById("downloadType");
    const inspectBtn = document.getElementById("inspectBtn");
    const inspectAllBtn = document.getElementById("inspectAllBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const downloadAllBtn = document.getElementById("downloadAllBtn");
    const openBtn = document.getElementById("openBtn");
    const copyPreviewBtn = document.getElementById("copyPreviewBtn");
    const chaptersEl = document.getElementById("chapters");
    const metricsEl = document.getElementById("metrics");
    const previewTitleEl = document.getElementById("previewTitle");
    const previewBodyEl = document.getElementById("previewBody");
    const logEl = document.getElementById("log");
    const taskListEl = document.getElementById("taskList");
    const taskCountEl = document.getElementById("taskCount");
    const currentTaskBadgeEl = document.getElementById("currentTaskBadge");
    const statusDotEl = document.getElementById("statusDot");
    const statusTextEl = document.getElementById("statusText");
    const progressBarEl = document.getElementById("progressBar");

    let tasks = [];
    let activeIndex = 0;
    let busy = false;

    const iconCheck = '<svg viewBox="0 0 24 24" fill="none" class="icon" aria-hidden="true"><path d="m5 12.5 4.2 4L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    function splitUrls() {
      const raw = urlsInput.value
        .split(/\s+/)
        .map((item) => item.trim())
        .filter(Boolean);
      const unique = [];
      const seen = new Set();
      raw.forEach((url) => {
        if (!seen.has(url)) {
          seen.add(url);
          unique.push(url);
        }
      });
      return unique;
    }

    function isSafeUrl(url) {
      try {
        const parsed = new URL(url);
        return parsed.protocol === "http:" || parsed.protocol === "https:";
      } catch (_error) {
        return false;
      }
    }

    function syncTasksFromInput() {
      const urls = splitUrls();
      const existing = new Map(tasks.map((task) => [task.url, task]));
      tasks = urls.map((url) => existing.get(url) || { url, status: "待分析", result: null, error: "" });
      if (activeIndex >= tasks.length) activeIndex = Math.max(0, tasks.length - 1);
      renderTasks();
      renderTaskCount();
      return tasks;
    }

    function activeTask() {
      syncTasksFromInput();
      return tasks[activeIndex] || null;
    }

    function typeLabel(value) {
      return {
        auto: "自动",
        novel: "小说",
        comic: "漫画",
        media: "音视频",
      }[value] || "自动";
    }

    function renderTaskCount() {
      taskCountEl.textContent = `${tasks.length} 条`;
    }

    function renderTasks() {
      taskListEl.innerHTML = "";
      if (!tasks.length) {
        taskListEl.innerHTML = '<div class="placeholder-card"><div><strong>队列是空的</strong>粘贴链接后，这里会自动生成任务。</div></div>';
        currentTaskBadgeEl.textContent = "未选择";
        return;
      }
      tasks.forEach((task, index) => {
        const item = document.createElement("div");
        item.className = `task-item${index === activeIndex ? " active" : ""}`;
        item.addEventListener("click", () => {
          activeIndex = index;
          renderTasks();
          renderTask(task);
        });
        const body = document.createElement("div");
        const title = document.createElement("div");
        title.className = "task-url";
        title.textContent = task.url;
        const meta = document.createElement("div");
        meta.className = "task-meta";
        meta.textContent = task.error || task.status;
        body.append(title, meta);
        const badge = document.createElement("span");
        badge.className = "mini-badge";
        badge.textContent = task.result?.page_type || task.status;
        item.append(body, badge);
        taskListEl.appendChild(item);
      });
      currentTaskBadgeEl.textContent = `${activeIndex + 1}/${tasks.length}`;
    }

    function setBusy(nextBusy) {
      busy = nextBusy;
      [inspectBtn, inspectAllBtn, downloadBtn, downloadAllBtn, openBtn].forEach((btn) => {
        btn.disabled = busy;
      });
    }

    function setProgress(done, total) {
      const value = total > 0 ? Math.round((done / total) * 100) : 0;
      progressBarEl.style.width = `${value}%`;
    }

    async function resolveApiBase() {
      const shouldUseLocalService =
        location.protocol === "file:" ||
        location.hostname.endsWith("github.io") ||
        location.hostname === "localhost" ||
        location.hostname === "127.0.0.1";

      if (!shouldUseLocalService) {
        setServiceStatus(true, `已连接：${API_BASE}`);
        return API_BASE;
      }
      for (let port = 8765; port < 8785; port += 1) {
        const base = `http://127.0.0.1:${port}`;
        try {
          const response = await fetch(`${base}/api/health`);
          const data = await response.json();
          if (data.ok && data.name === "novel_downloader") {
            API_BASE = base;
            setServiceStatus(true, `已连接：${base}`);
            log(`已连接本地服务：${base}`);
            return API_BASE;
          }
        } catch (_error) {
          // Try next local port.
        }
      }
      setServiceStatus(false, "未连接本地服务");
      throw new Error("没有找到本地下载服务，请先双击启动脚本。");
    }

    function setServiceStatus(ok, text) {
      statusDotEl.classList.toggle("ok", ok);
      statusDotEl.classList.toggle("bad", !ok);
      statusTextEl.textContent = text;
    }

    function log(message) {
      const now = new Date().toLocaleTimeString();
      logEl.textContent += `\n[${now}] ${message}`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setPreview(title, content, images = []) {
      previewTitleEl.textContent = title || "暂无标题";
      previewBodyEl.textContent = content || "没有抓到正文。";
      if (Array.isArray(images) && images.length > 0) {
        const grid = document.createElement("div");
        grid.className = "image-preview-grid";
        images.forEach((src, index) => {
          const img = document.createElement("img");
          img.src = src;
          img.alt = `预览图片 ${index + 1}`;
          img.loading = "lazy";
          img.referrerPolicy = "no-referrer";
          grid.appendChild(img);
        });
        previewBodyEl.appendChild(grid);
      }
    }

    function renderMetrics(data) {
      const items = [
        ["入口", data?.book_title || "待预览"],
        ["类型", data?.page_type || "自动判断"],
        ["分类", data?.category_count ?? "-"],
        ["书籍", data?.book_count ?? "-"],
        ["章节", data?.chapter_count ?? "-"],
      ];
      metricsEl.innerHTML = "";
      items.forEach(([label, value]) => {
        const metric = document.createElement("div");
        metric.className = `metric${data ? "" : " is-empty"}`;
        metric.innerHTML = `<span class="metric-value"></span><span class="metric-label">${label}</span>`;
        metric.querySelector(".metric-value").textContent = value;
        metricsEl.appendChild(metric);
      });
    }

    function kindLabel(kind) {
      return {
        site: "总",
        category: "分类",
        book: "书",
        comic: "漫画",
        catalog: "目录",
        chapter: "正文",
        comic_chapter: "图片",
      }[kind] || kind || "";
    }

    function nodeSummary(node) {
      if (node.kind === "category") {
        const parts = [];
        if (node.page_count) parts.push(`${node.page_count}页`);
        if (node.book_count) parts.push(`${node.book_count}本`);
        return parts.join(" / ");
      }
      if ((node.kind === "book" || node.kind === "comic") && node.children?.length) return `${node.children.length}项`;
      if (node.kind === "catalog" && node.children?.length) return `${node.children.length}章`;
      return "";
    }

    function renderTree(root) {
      chaptersEl.innerHTML = "";
      if (!root) {
        chaptersEl.innerHTML = '<div class="empty-state"><div><strong>还没有目录</strong>预览后会在这里显示分类、书名、章节和正文层级。</div></div>';
        return;
      }
      chaptersEl.appendChild(createNode(root, 0));
    }

    function createNode(node, depth) {
      const wrap = document.createElement("div");
      wrap.className = "node";
      wrap.dataset.depth = String(depth);
      if (depth <= 1) wrap.classList.add("expanded");

      const row = document.createElement("div");
      row.className = "node-row";
      row.style.paddingLeft = `${12 + depth * 18}px`;

      const hasChildren = Array.isArray(node.children) && node.children.length > 0;
      const caret = document.createElement("span");
      caret.className = "caret";
      caret.textContent = hasChildren ? "▾" : "";

      const title = document.createElement("span");
      title.className = "node-title";
      title.textContent = node.title || "未命名";

      const badge = document.createElement("span");
      badge.className = "badge";
      const summary = nodeSummary(node);
      badge.textContent = summary ? `${kindLabel(node.kind)} · ${summary}` : kindLabel(node.kind);

      row.append(caret, title, badge);
      row.addEventListener("click", async () => {
        document.querySelectorAll(".node-row").forEach((el) => el.classList.remove("active"));
        row.classList.add("active");
        if (hasChildren) {
          wrap.classList.toggle("expanded");
          caret.textContent = wrap.classList.contains("expanded") ? "▾" : "▸";
        }
        if (node.kind === "chapter" || node.kind === "comic_chapter") {
          await loadChapterPreview(node.url);
        } else if ((node.kind === "book" || node.kind === "comic") && (!node.children || node.children.length === 0)) {
          await loadBookCatalog(node, wrap);
        } else {
          setPreview(node.title, describeNode(node));
        }
      });

      wrap.appendChild(row);
      if (hasChildren) {
        const children = document.createElement("div");
        children.className = "children";
        node.children.forEach((child) => children.appendChild(createNode(child, depth + 1)));
        wrap.appendChild(children);
      }
      return wrap;
    }

    function describeNode(node) {
      if (node.kind === "site") return "这是站点入口。展开分类，再点书名加载目录。";
      if (node.kind === "category") return `分类：${node.title}\n分页：${node.page_count || 0}\n识别到：${node.book_count || 0} 本`;
      if (node.kind === "book") return "这是一本书。点击后会加载章节目录。";
      if (node.kind === "comic") return "这是一本漫画。点击后会加载章节和图片预览。";
      if (node.kind === "catalog") return "这是目录。点任意章节就能看正文或图片。";
      return "";
    }

    async function postJson(path, payload) {
      await resolveApiBase();
      let response;
      try {
        response = await fetch(`${API_BASE}${path}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
      } catch (_error) {
        throw new Error("连接本地下载服务失败。请确认已双击启动脚本，并刷新页面后再试。");
      }
      const data = await response.json();
      if (!response.ok || !data.ok) {
        throw new Error(data.error || "请求失败");
      }
      return data;
    }

    function warnTypeMismatch(url) {
      const type = downloadTypeInput.value;
      if (type === "media") {
        log("音视频现在是兼容尝试模式；遇到 403、登录页或人工验证时，会停止并提示原因。");
      }
      if (type === "comic" && !/comic|cate|manwa|manga/i.test(url)) {
        log("你选了漫画，但链接看起来不像漫画站。我会继续自动判断。");
      }
      if (type === "novel" && /comic|manwa|manga/i.test(url)) {
        log("你选了小说，但链接看起来像漫画站。我会继续自动判断。");
      }
    }

    async function inspectTask(index) {
      const task = tasks[index];
      if (!task) return;
      if (!isSafeUrl(task.url)) {
        task.status = "链接无效";
        task.error = "只支持 http/https 链接";
        renderTasks();
        throw new Error(`${task.url} 不是安全链接`);
      }
      if (/aigei\.com/i.test(task.url)) {
        log("爱给网常见 403/banip 防护：如果预览失败，通常不是本地工具坏了，而是站点拒绝脚本访问。");
      }
      warnTypeMismatch(task.url);
      task.status = "分析中";
      task.error = "";
      renderTasks();
      const data = await postJson("/api/inspect", { url: task.url, download_type: downloadTypeInput.value });
      task.result = data.result;
      task.status = "已分析";
      renderTasks();
      if (index === activeIndex) renderTask(task);
      return data.result;
    }

    function renderTask(task) {
      if (!task?.result) {
        renderMetrics(null);
        renderTree(null);
        setPreview("还没有预览", task?.error || "先点“先看预览”，确认内容再下载。");
        return;
      }
      renderMetrics(task.result);
      renderTree(task.result.tree);
      if (task.result.first_preview) {
        setPreview(task.result.first_preview.title, task.result.first_preview.content, task.result.first_preview.images);
      } else {
        setPreview(task.result.book_title, "已完成结构分析。");
      }
    }

    async function inspectCurrent() {
      syncTasksFromInput();
      const task = activeTask();
      if (!task) {
        log("先粘贴一个链接。");
        return;
      }
      setBusy(true);
      setProgress(0, 1);
      try {
        log(`开始预览：${task.url}`);
        await inspectTask(activeIndex);
        setProgress(1, 1);
        log(`预览好了：${task.result?.book_title || task.url}`);
      } catch (error) {
        task.status = "分析失败";
        task.error = error.message;
        renderTasks();
        setPreview("分析失败", error.message);
        log(`预览失败：${error.message}`);
      } finally {
        setBusy(false);
      }
    }

    async function inspectAll() {
      syncTasksFromInput();
      if (!tasks.length) {
        log("先粘贴一个链接。");
        return;
      }
      setBusy(true);
      setProgress(0, tasks.length);
      let done = 0;
      try {
        for (let index = 0; index < tasks.length; index += 1) {
          activeIndex = index;
          renderTasks();
          log(`批量预览 ${index + 1}/${tasks.length}：${tasks[index].url}`);
          try {
            await inspectTask(index);
          } catch (error) {
            tasks[index].status = "分析失败";
            tasks[index].error = error.message;
            log(`这一条预览失败，继续下一条：${error.message}`);
          }
          done += 1;
          setProgress(done, tasks.length);
        }
        renderTask(tasks[activeIndex]);
        log("批量预览完成。");
      } finally {
        setBusy(false);
      }
    }

    async function loadBookCatalog(node, wrap) {
      log(`加载目录：${node.title}`);
      try {
        const data = await postJson("/api/book-catalog", { url: node.url, download_type: downloadTypeInput.value });
        const bookTree = data.result.tree;
        node.children = bookTree.children || [];
        const oldChildren = wrap.querySelector(":scope > .children");
        if (oldChildren) oldChildren.remove();
        const children = document.createElement("div");
        children.className = "children";
        const childDepth = Number(wrap.dataset.depth || "0") + 1;
        node.children.forEach((child) => children.appendChild(createNode(child, childDepth)));
        wrap.appendChild(children);
        wrap.classList.add("expanded");
        const caret = wrap.querySelector(":scope > .node-row .caret");
        if (caret) caret.textContent = "▾";
        setPreview(node.title, `目录加载好了，共 ${data.result.chapter_count || 0} 章。`);
      } catch (error) {
        log(`目录加载失败：${error.message}`);
        setPreview("目录加载失败", error.message);
      }
    }

    async function loadChapterPreview(url) {
      if (!url) return;
      log(`加载预览：${url}`);
      try {
        const data = await postJson("/api/chapter-preview", { url, download_type: downloadTypeInput.value });
        setPreview(data.result.title, data.result.content, data.result.images);
      } catch (error) {
        log(`预览失败：${error.message}`);
      }
    }

    async function downloadTask(index) {
      const task = tasks[index];
      if (!task) return null;
      if (!isSafeUrl(task.url)) throw new Error(`${task.url} 不是安全链接`);
      warnTypeMismatch(task.url);
      task.status = "下载中";
      task.error = "";
      renderTasks();
      const output = outputInput.value.trim() || "下载的小说";
      const book_workers = Number(workersInput.value || "2");
      const data = await postJson("/api/download", {
        url: task.url,
        output,
        book_workers,
        download_type: downloadTypeInput.value,
      });
      task.status = "已下载";
      task.download = data.result;
      renderTasks();
      return data.result;
    }

    async function downloadCurrent() {
      syncTasksFromInput();
      const task = activeTask();
      if (!task) {
        log("先粘贴一个链接。");
        return;
      }
      setBusy(true);
      setProgress(0, 1);
      try {
        log(`开始下载：${task.url}`);
        const result = await downloadTask(activeIndex);
        setProgress(1, 1);
        const imageText = result.image_count ? `，图片 ${result.image_count} 张` : "";
        log(`下载完成：${result.merged_path}，章节文件 ${result.chapter_count} 个${imageText}。`);
        setPreview("下载完成", `${iconFreeText()}保存位置：${result.merged_path}\n章节文件：${result.chapter_count} 个${imageText}`);
      } catch (error) {
        task.status = "下载失败";
        task.error = error.message;
        renderTasks();
        setPreview("下载失败", error.message);
        log(`下载失败：${error.message}`);
      } finally {
        setBusy(false);
      }
    }

    async function downloadAll() {
      syncTasksFromInput();
      if (!tasks.length) {
        log("先粘贴一个链接。");
        return;
      }
      setBusy(true);
      setProgress(0, tasks.length);
      let done = 0;
      let success = 0;
      try {
        for (let index = 0; index < tasks.length; index += 1) {
          activeIndex = index;
          renderTasks();
          log(`批量下载 ${index + 1}/${tasks.length}：${tasks[index].url}`);
          try {
            await downloadTask(index);
            success += 1;
          } catch (error) {
            tasks[index].status = "下载失败";
            tasks[index].error = error.message;
          log(`这一条下载失败，继续下一条：${error.message}`);
          }
          done += 1;
          setProgress(done, tasks.length);
        }
        log(`批量下载完成：成功 ${success}/${tasks.length}。`);
      } finally {
        setBusy(false);
      }
    }

    function iconFreeText() {
      return "";
    }

    async function openOutputDir() {
      const output = outputInput.value.trim() || "下载的小说";
      setBusy(true);
      try {
        const data = await postJson("/api/open-output", { output });
        log(`已打开：${data.result.path}`);
      } catch (error) {
        log(`打开目录失败：${error.message}`);
      } finally {
        setBusy(false);
      }
    }

    async function copyPreview() {
      const text = `${previewTitleEl.textContent}\n\n${previewBodyEl.textContent}`.trim();
      try {
        await navigator.clipboard.writeText(text);
        log("预览内容已复制。");
      } catch (_error) {
        log("复制失败：浏览器没有开放剪贴板权限。");
      }
    }

    urlsInput.addEventListener("input", () => {
      syncTasksFromInput();
    });
    inspectBtn.addEventListener("click", inspectCurrent);
    inspectAllBtn.addEventListener("click", inspectAll);
    downloadBtn.addEventListener("click", downloadCurrent);
    downloadAllBtn.addEventListener("click", downloadAll);
    openBtn.addEventListener("click", openOutputDir);
    copyPreviewBtn.addEventListener("click", copyPreview);

    syncTasksFromInput();
    renderMetrics(null);
    resolveApiBase().catch((error) => log(error.message));
  </script>
</body>
</html>
